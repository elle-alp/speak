<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pronunciation Quest</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    overflow-x:hidden;
    color:white;
    position:relative;
    background:linear-gradient(135deg,#6C63FF,#00C2FF,#5DE6A9);
}

/* Roblox-inspired background */

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15), transparent 25%),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,0.12), transparent 22%),
    radial-gradient(circle at 60% 80%, rgba(255,255,255,0.10), transparent 20%),
    linear-gradient(45deg, rgba(255,255,255,0.08) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(255,255,255,0.08) 25%, transparent 25%);
    background-size:300px 300px;
    filter:blur(6px);
    z-index:-1;
}

.wrapper{
    max-width:900px;
    margin:auto;
    padding:25px;
}

.title{
    text-align:center;
    font-size:3rem;
    font-weight:bold;
    margin-top:10px;
    margin-bottom:8px;
    text-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.subtitle{
    text-align:center;
    opacity:0.9;
    margin-bottom:25px;
}

.panel{
    background:rgba(255,255,255,0.14);
    backdrop-filter:blur(14px);
    border-radius:30px;
    padding:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
    margin-bottom:20px;
}

textarea{
    width:100%;
    min-height:130px;
    border:none;
    border-radius:18px;
    padding:15px;
    font-size:16px;
    outline:none;
    resize:vertical;
    color:#222;
}

button{
    border:none;
    border-radius:16px;
    cursor:pointer;
    transition:0.2s;
    font-weight:bold;
}

button:hover{
    transform:translateY(-2px);
}

.primary{
    background:#ffffff;
    color:#333;
    padding:12px 20px;
}

.upload{
    background:#ffe066;
    color:#333;
    padding:12px 20px;
}

.assessment-card{
    margin-top:25px;
    text-align:center;
    padding:25px;
    border-radius:25px;
    background:rgba(255,255,255,0.12);
}

.word-area{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:15px;
    margin-bottom:25px;
}

.current-word{
    font-size:3rem;
    font-weight:bold;
    letter-spacing:2px;
    text-shadow:0 5px 15px rgba(0,0,0,0.25);
}

.audio-btn{
    width:65px;
    height:65px;
    border-radius:50%;
    background:#ffffff;
    color:#333;
    font-size:28px;
    box-shadow:0 6px 20px rgba(0,0,0,0.25);
}

.mic-btn{
    width:150px;
    height:150px;
    border-radius:50%;
    background:#ff4d6d;
    color:white;
    font-size:55px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.mic-btn.listening{
    background:#00c897;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

.status{
    margin-top:15px;
    font-size:18px;
    opacity:0.95;
}

.score-container{
    margin-top:25px;
}

.score-ring{
    width:200px;
    height:200px;
    border-radius:50%;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    background:conic-gradient(#00ff99 0deg,#ffffff33 0deg);
    position:relative;
}

.score-ring::before{
    content:'';
    position:absolute;
    width:150px;
    height:150px;
    border-radius:50%;
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(5px);
}

.score-text{
    position:relative;
    z-index:2;
    font-size:3rem;
    font-weight:bold;
}

.feedback{
    margin-top:20px;
    font-size:1.2rem;
    min-height:35px;
}

.progress{
    margin-top:20px;
    font-size:1rem;
    opacity:0.9;
}

.summary{
    display:none;
    margin-top:30px;
    background:rgba(255,255,255,0.12);
    border-radius:20px;
    padding:20px;
}

.summary h2{
    margin-bottom:15px;
}

.summary-table{
    width:100%;
    border-collapse:collapse;
}

.summary-table th,
.summary-table td{
    padding:12px;
    border-bottom:1px solid rgba(255,255,255,0.2);
    text-align:center;
}

.pass{
    color:#b7ffb7;
    font-weight:bold;
}

.fail{
    color:#ffd6d6;
    font-weight:bold;
}

.hidden{
    display:none;
}

@media(max-width:768px){

    .title{
        font-size:2rem;
    }

    .current-word{
        font-size:2.2rem;
    }

    .mic-btn{
        width:120px;
        height:120px;
        font-size:42px;
    }

    .score-ring{
        width:160px;
        height:160px;
    }

    .score-ring::before{
        width:120px;
        height:120px;
    }

}

</style>
</head>

<body>

<div class="wrapper">

    <div class="title">Pronunciation Quest</div>
    <div class="subtitle">
        Speak clearly. Score higher. Unlock the next word.
    </div>

    <div class="panel">

        <textarea id="wordInput" placeholder="Enter words separated by commas or new lines...">apple
banana
computer
dolphin
elephant
photograph
school
whale</textarea>

        <div class="controls">

            <button class="primary" id="startBtn">
                Load & Shuffle Words
            </button>

            <label class="upload">
                Upload TXT
                <input type="file" id="fileInput" accept=".txt" hidden>
            </label>

        </div>

        <div class="assessment-card hidden" id="assessmentCard">

            <div class="word-area">

                <div class="current-word" id="currentWord">
                    Word
                </div>

                <button class="audio-btn" id="audioBtn">
                    🔊
                </button>

            </div>

            <button class="mic-btn" id="micBtn">
                🎤
            </button>

            <div class="status" id="status">
                Press microphone to begin
            </div>

            <div class="score-container">

                <div class="score-ring" id="scoreRing">

                    <div class="score-text" id="scoreText">
                        0%
                    </div>

                </div>

            </div>

            <div class="feedback" id="feedback">
                Awaiting pronunciation...
            </div>

            <div class="progress" id="progress">
                0 / 0
            </div>

        </div>

        <div class="summary" id="summary">

            <h2>Pronunciation Summary</h2>

            <table class="summary-table">

                <thead>
                    <tr>
                        <th>Word</th>
                        <th>Score</th>
                        <th>Result</th>
                    </tr>
                </thead>

                <tbody id="summaryBody"></tbody>

            </table>

            <h3 style="margin-top:20px;" id="averageScore">
                Average Score: 0%
            </h3>

        </div>

    </div>

</div>

<script>

/////////////////////////////////////////////////
// ELEMENTS
/////////////////////////////////////////////////

const wordInput = document.getElementById('wordInput');
const startBtn = document.getElementById('startBtn');
const fileInput = document.getElementById('fileInput');

const assessmentCard = document.getElementById('assessmentCard');
const currentWord = document.getElementById('currentWord');
const audioBtn = document.getElementById('audioBtn');
const micBtn = document.getElementById('micBtn');

const statusText = document.getElementById('status');
const scoreText = document.getElementById('scoreText');
const scoreRing = document.getElementById('scoreRing');
const feedback = document.getElementById('feedback');
const progress = document.getElementById('progress');

const summary = document.getElementById('summary');
const summaryBody = document.getElementById('summaryBody');
const averageScore = document.getElementById('averageScore');

/////////////////////////////////////////////////
// VARIABLES
/////////////////////////////////////////////////

let words = [];
let currentIndex = 0;
let currentScore = 0;
let scores = [];

let listening = false;
let recognition;

/////////////////////////////////////////////////
// MICROPHONE ACCESS
/////////////////////////////////////////////////

async function initializeMic(){

    try{

        await navigator.mediaDevices.getUserMedia({
            audio:true
        });

    }catch(error){

        alert("Microphone permission denied.");

    }

}

initializeMic();

/////////////////////////////////////////////////
// SPEECH RECOGNITION
/////////////////////////////////////////////////

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(SpeechRecognition){

    recognition = new SpeechRecognition();

    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = true;
    recognition.maxAlternatives = 3;

}else{

    alert("Speech Recognition is not supported.");

}

let transcriptResult = '';

/////////////////////////////////////////////////
// LOAD WORDS
/////////////////////////////////////////////////

startBtn.addEventListener('click',()=>{

    const raw = wordInput.value;

    words = raw
    .split(/[\n,]+/)
    .map(w=>w.trim())
    .filter(w=>w.length>0);

    if(words.length===0){

        alert("Please enter words.");
        return;

    }

    shuffle(words);

    currentIndex = 0;
    scores = [];

    assessmentCard.classList.remove('hidden');
    summary.style.display = 'none';

    loadCurrentWord();

});

/////////////////////////////////////////////////
// FILE UPLOAD
/////////////////////////////////////////////////

fileInput.addEventListener('change',(e)=>{

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){

        wordInput.value = event.target.result;

    }

    reader.readAsText(file);

});

/////////////////////////////////////////////////
// SHUFFLE
/////////////////////////////////////////////////

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [array[i],array[j]]=[array[j],array[i]];

    }

}

/////////////////////////////////////////////////
// LOAD CURRENT WORD
/////////////////////////////////////////////////

function loadCurrentWord(){

    const word = words[currentIndex];

    currentWord.textContent = word;

    scoreText.textContent = "0%";

    feedback.textContent = "Awaiting pronunciation...";

    statusText.textContent = "Press microphone to begin";

    updateRing(0);

    progress.textContent =
    `${currentIndex+1} / ${words.length}`;

}

/////////////////////////////////////////////////
// AUDIO BUTTON
/////////////////////////////////////////////////

audioBtn.addEventListener('click',()=>{

    const utterance =
    new SpeechSynthesisUtterance(words[currentIndex]);

    utterance.lang = 'en-US';
    utterance.rate = 0.7;

    speechSynthesis.speak(utterance);

});

/////////////////////////////////////////////////
// MICROPHONE BUTTON
/////////////////////////////////////////////////

micBtn.addEventListener('click',()=>{

    if(!listening){

        startListening();

    }else{

        stopListening();

    }

});

/////////////////////////////////////////////////
// START LISTENING
/////////////////////////////////////////////////

function startListening(){

    transcriptResult = '';

    recognition.start();

    listening = true;

    micBtn.classList.add('listening');

    statusText.textContent =
    "Listening... Click microphone again to confirm.";

}

/////////////////////////////////////////////////
// STOP LISTENING
/////////////////////////////////////////////////

function stopListening(){

    recognition.stop();

    listening = false;

    micBtn.classList.remove('listening');

    statusText.textContent =
    "Assessing pronunciation...";

}

/////////////////////////////////////////////////
// SPEECH RESULT
/////////////////////////////////////////////////

recognition.onresult = function(event){

    transcriptResult =
    event.results[event.results.length-1][0]
    .transcript
    .trim()
    .toLowerCase();

};

recognition.onend = function(){

    if(transcriptResult){

        assessPronunciation(
        words[currentIndex].toLowerCase(),
        transcriptResult
        );

    }

};

/////////////////////////////////////////////////
// LEVENSHTEIN
/////////////////////////////////////////////////

function levenshtein(a,b){

    const matrix=[];

    for(let i=0;i<=b.length;i++){

        matrix[i]=[i];

    }

    for(let j=0;j<=a.length;j++){

        matrix[0][j]=j;

    }

    for(let i=1;i<=b.length;i++){

        for(let j=1;j<=a.length;j++){

            if(b.charAt(i-1)==a.charAt(j-1)){

                matrix[i][j]=matrix[i-1][j-1];

            }else{

                matrix[i][j]=Math.min(
                matrix[i-1][j-1]+1,
                matrix[i][j-1]+1,
                matrix[i-1][j]+1
                );

            }

        }

    }

    return matrix[b.length][a.length];

}

/////////////////////////////////////////////////
// ASSESSMENT
/////////////////////////////////////////////////

function assessPronunciation(target,spoken){

    const distance =
    levenshtein(target,spoken);

    const maxLength =
    Math.max(target.length,spoken.length);

    let similarity =
    ((maxLength-distance)/maxLength)*100;

    // Allow slight tone/accent/stress mistakes
    similarity += 10;

    similarity = Math.max(10,Math.min(100,similarity));

    const score = Math.round(similarity);

    currentScore = score;

    setScore(score);

    if(score>=50){

        feedback.textContent =
        `Great! You pronounced "${spoken}" correctly.`;

        playSuccessSound();

        scores.push({
            word:target,
            score:score,
            result:'Passed'
        });

        setTimeout(()=>{

            nextWord();

        },1400);

    }else{

        feedback.textContent =
        `Try again. We heard "${spoken}".`;

        playFailSound();

    }

}

/////////////////////////////////////////////////
// SCORE DISPLAY
/////////////////////////////////////////////////

function setScore(score){

    scoreText.textContent = score + "%";

    updateRing(score);

}

function updateRing(score){

    const deg = score * 3.6;

    scoreRing.style.background =
    `conic-gradient(
    #00ff99 ${deg}deg,
    rgba(255,255,255,0.2) ${deg}deg
    )`;

}

/////////////////////////////////////////////////
// NEXT WORD
/////////////////////////////////////////////////

function nextWord(){

    currentIndex++;

    if(currentIndex>=words.length){

        finishAssessment();
        return;

    }

    loadCurrentWord();

}

/////////////////////////////////////////////////
// SUMMARY
/////////////////////////////////////////////////

function finishAssessment(){

    assessmentCard.classList.add('hidden');

    summary.style.display = 'block';

    summaryBody.innerHTML = '';

    let total = 0;

    scores.forEach(item=>{

        total += item.score;

        const row = document.createElement('tr');

        row.innerHTML = `
        <td>${item.word}</td>
        <td>${item.score}%</td>
        <td class="pass">${item.result}</td>
        `;

        summaryBody.appendChild(row);

    });

    const avg =
    Math.round(total / scores.length);

    averageScore.textContent =
    `Average Score: ${avg}%`;

}

/////////////////////////////////////////////////
// SUCCESS SOUND
/////////////////////////////////////////////////

function playSuccessSound(){

    const audioCtx =
    new (window.AudioContext ||
    window.webkitAudioContext)();

    const oscillator =
    audioCtx.createOscillator();

    const gain =
    audioCtx.createGain();

    oscillator.type = 'sine';
    oscillator.frequency.value = 900;

    oscillator.connect(gain);
    gain.connect(audioCtx.destination);

    oscillator.start();

    gain.gain.exponentialRampToValueAtTime(
    0.00001,
    audioCtx.currentTime + 0.6
    );

    oscillator.stop(audioCtx.currentTime+0.6);

}

/////////////////////////////////////////////////
// FAIL SOUND
/////////////////////////////////////////////////

function playFailSound(){

    const audioCtx =
    new (window.AudioContext ||
    window.webkitAudioContext)();

    const oscillator =
    audioCtx.createOscillator();

    const gain =
    audioCtx.createGain();

    oscillator.type = 'triangle';
    oscillator.frequency.setValueAtTime(
    400,
    audioCtx.currentTime
    );

    oscillator.frequency.exponentialRampToValueAtTime(
    150,
    audioCtx.currentTime + 0.6
    );

    oscillator.connect(gain);
    gain.connect(audioCtx.destination);

    oscillator.start();

    gain.gain.exponentialRampToValueAtTime(
    0.00001,
    audioCtx.currentTime + 0.7
    );

    oscillator.stop(audioCtx.currentTime+0.7);

}

</script>

</body>
</html>
